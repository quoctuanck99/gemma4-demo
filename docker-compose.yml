services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Persist downloaded model weights across container restarts
      - model_cache:/root/.cache/huggingface
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  model_cache:
